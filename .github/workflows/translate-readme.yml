name: Auto Translate README to Chinese

on:
  push:
    paths:
      - 'README.md'
    branches:
      - main

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Run Chinese translation script
      run: |
        python scripts/translate_to_chinese.py
        
    - name: Debug file status
      run: |
        echo "=== File Status ==="
        ls -la README_ZH-CN.md
        echo "=== Git Status ==="
        git status
        echo "=== File Content Preview ==="
        head -5 README_ZH-CN.md
    
    - name: Check for changes
      id: check-changes
      run: |
        # Check if README_ZH-CN.md exists and has content
        if [ -f README_ZH-CN.md ] && [ -s README_ZH-CN.md ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md exists and has content"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md does not exist or is empty"
        fi
    
    - name: Submit Chinese version
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Starting git operations..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "Adding README_ZH-CN.md to git..."
        git add README_ZH-CN.md
        
        echo "Committing changes..."
        git commit -m "🤖 Auto update Chinese version README_ZH-CN.md
        
        Generated by GitHub Actions
        Source file: README.md
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        
        echo "Pushing to repository..."
        git push origin HEAD:${{ github.ref }}
        echo "Successfully pushed changes!" 