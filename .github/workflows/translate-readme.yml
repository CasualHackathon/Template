name: Auto Translate README to Chinese

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_run:
    workflows: ["Update Hackathon Information & Sync README"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # Manual trigger as backup

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run if the triggering workflow was successful and README.md was changed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check if README.md was changed
      id: check-readme
      run: |
        # Get the commit SHA from the triggering workflow
        TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
        CURRENT_SHA="${{ github.sha }}"
        
        echo "Trigger SHA: $TRIGGER_SHA"
        echo "Current SHA: $CURRENT_SHA"
        
        # For workflow_run, we need to check if README.md exists and has recent changes
        # Since we're in a separate workflow, we'll check if README.md exists and is recent
        if [ -f README.md ]; then
          echo "README.md exists"
          # Check if README.md was modified recently (within last 5 minutes)
          README_MTIME=$(stat -c %Y README.md 2>/dev/null || stat -f %m README.md 2>/dev/null)
          CURRENT_TIME=$(date +%s)
          TIME_DIFF=$((CURRENT_TIME - README_MTIME))
          
          echo "README.md modification time: $README_MTIME"
          echo "Current time: $CURRENT_TIME"
          echo "Time difference: $TIME_DIFF seconds"
          
          if [ $TIME_DIFF -lt 300 ]; then  # 5 minutes = 300 seconds
            echo "readme_changed=true" >> $GITHUB_OUTPUT
            echo "README.md was recently modified"
          else
            echo "readme_changed=false" >> $GITHUB_OUTPUT
            echo "README.md was not recently modified"
          fi
        else
          echo "readme_changed=false" >> $GITHUB_OUTPUT
          echo "README.md does not exist"
        fi
    
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Run Chinese translation script
      if: steps.check-readme.outputs.readme_changed == 'true'
      run: |
        python scripts/translate_to_chinese.py
     
    - name: Check for changes
      if: steps.check-readme.outputs.readme_changed == 'true'
      id: check-changes
      run: |
        # Check if README_ZH-CN.md exists and has content
        if [ -f README_ZH-CN.md ] && [ -s README_ZH-CN.md ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md exists and has content"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md does not exist or is empty"
        fi
    
    - name: Submit Chinese version
      if: steps.check-readme.outputs.readme_changed == 'true' && steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Starting git operations..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "Adding README_ZH-CN.md to git..."
        git add README_ZH-CN.md
        
        echo "Committing changes..."
        git commit -m "🤖 Manual update Chinese version README_ZH-CN.md
        
        Generated by GitHub Actions
        Source file: README.md
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        
        echo "Pushing to repository..."
        git push origin HEAD:${{ github.ref }}
        echo "Successfully pushed changes!" 