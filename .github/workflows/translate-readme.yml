name: Auto Translate README to Chinese

on:
  workflow_run:
    workflows: ["Update Hackathon Information & Sync README"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # Manual trigger as backup

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run if the triggering workflow was successful and README.md was changed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check if README.md was changed
      id: check-readme
      run: |
        # Get the commit SHA from the triggering workflow
        TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
        CURRENT_SHA="${{ github.sha }}"
        
        # Check if README.md was changed in the triggering commit
        if git diff --name-only $TRIGGER_SHA~1 $TRIGGER_SHA | grep -q "^README\.md$"; then
          echo "readme_changed=true" >> $GITHUB_OUTPUT
          echo "README.md was changed in the triggering workflow"
        else
          echo "readme_changed=false" >> $GITHUB_OUTPUT
          echo "README.md was not changed in the triggering workflow"
        fi
    
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Run Chinese translation script
      if: steps.check-readme.outputs.readme_changed == 'true'
      run: |
        python scripts/translate_to_chinese.py
     
    - name: Check for changes
      if: steps.check-readme.outputs.readme_changed == 'true'
      id: check-changes
      run: |
        # Check if README_ZH-CN.md exists and has content
        if [ -f README_ZH-CN.md ] && [ -s README_ZH-CN.md ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md exists and has content"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md does not exist or is empty"
        fi
    
    - name: Submit Chinese version
      if: steps.check-readme.outputs.readme_changed == 'true' && steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Starting git operations..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "Adding README_ZH-CN.md to git..."
        git add README_ZH-CN.md
        
        echo "Committing changes..."
        git commit -m "🤖 Manual update Chinese version README_ZH-CN.md
        
        Generated by GitHub Actions
        Source file: README.md
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        
        echo "Pushing to repository..."
        git push origin HEAD:${{ github.ref }}
        echo "Successfully pushed changes!" 