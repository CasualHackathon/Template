name: Auto Translate README to Chinese

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:  # Manual trigger as backup

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Run for push events or manual dispatch
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check if README.md was changed
      id: check-readme
      run: |
        echo "Event type: ${{ github.event_name }}"
        
        if [ "${{ github.event_name }}" = "push" ]; then
          # For push events, README.md was definitely changed
          echo "readme_changed=true" >> $GITHUB_OUTPUT
          echo "README.md was changed via push event"
        else
          # For workflow_dispatch, always run
          echo "readme_changed=true" >> $GITHUB_OUTPUT
          echo "Manual trigger - running translation"
        fi
    
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Run Chinese translation script
      if: steps.check-readme.outputs.readme_changed == 'true'
      run: |
        python scripts/translate_to_chinese.py
     
    - name: Check for changes
      if: steps.check-readme.outputs.readme_changed == 'true'
      id: check-changes
      run: |
        # Check if README_ZH-CN.md exists and has content
        if [ -f README_ZH-CN.md ] && [ -s README_ZH-CN.md ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md exists and has content"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md does not exist or is empty"
        fi
    
    - name: Submit Chinese version
      if: steps.check-readme.outputs.readme_changed == 'true' && steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Starting git operations..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "Adding README_ZH-CN.md to git..."
        git add README_ZH-CN.md
        
        echo "Committing changes..."
        git commit -m "🤖 Manual update Chinese version README_ZH-CN.md
        
        Generated by GitHub Actions
        Source file: README.md
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        
        echo "Pushing to repository..."
        git push origin HEAD:${{ github.ref }}
        echo "Successfully pushed changes!" 