name: Auto Translate README to Chinese

on:
  push:
    paths:
      - 'README.md'
    branches:
      - main

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Run Chinese translation script
      run: |
        python scripts/translate_to_chinese.py
    
    - name: Check for changes
      id: check-changes
      run: |
        if git diff --quiet README_ZH-CN.md; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Submit Chinese version
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README_ZH-CN.md
        git commit -m "🤖 Auto update Chinese version README_ZH-CN.md
        
        Generated by GitHub Actions
        Source file: README.md
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        git push origin HEAD:${{ github.ref }} 