name: Auto Translate README to Chinese

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_run:
    workflows: ["Update Hackathon Information & Sync README"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # Manual trigger as backup

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Run for push events, successful workflow_run events, or manual dispatch
    if: github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check if README.md was changed
      id: check-readme
      run: |
        echo "Event type: ${{ github.event_name }}"
        
        if [ "${{ github.event_name }}" = "push" ]; then
          # For push events, README.md was definitely changed
          echo "readme_changed=true" >> $GITHUB_OUTPUT
          echo "README.md was changed via push event"
        elif [ "${{ github.event_name }}" = "workflow_run" ]; then
          # For workflow_run events, check if README.md was modified in the triggering workflow
          TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Trigger workflow SHA: $TRIGGER_SHA"
          
          # Get the commit range to check
          PREV_SHA=$(git rev-parse $TRIGGER_SHA~1 2>/dev/null || echo "")
          if [ -n "$PREV_SHA" ]; then
            echo "Previous SHA: $PREV_SHA"
            echo "Current SHA: $TRIGGER_SHA"
            
            # Check if README.md was changed in the triggering commit
            CHANGED_FILES=$(git diff --name-only $PREV_SHA $TRIGGER_SHA)
            echo "Changed files: $CHANGED_FILES"
            
            if echo "$CHANGED_FILES" | grep -q "^README\.md$"; then
              echo "readme_changed=true" >> $GITHUB_OUTPUT
              echo "README.md was changed in the triggering workflow"
            else
              echo "readme_changed=false" >> $GITHUB_OUTPUT
              echo "README.md was not changed in the triggering workflow"
            fi
          else
            # If we can't get previous SHA, assume README.md was changed
            echo "readme_changed=true" >> $GITHUB_OUTPUT
            echo "Could not determine previous SHA, assuming README.md was changed"
          fi
        else
          # For workflow_dispatch, always run
          echo "readme_changed=true" >> $GITHUB_OUTPUT
          echo "Manual trigger - running translation"
        fi
    
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Debug current state
      run: |
        echo "=== Current Repository State ==="
        echo "Current branch: $(git branch --show-current)"
        echo "Current commit: $(git rev-parse HEAD)"
        echo "README.md exists: $([ -f README.md ] && echo 'Yes' || echo 'No')"
        echo "README_ZH-CN.md exists: $([ -f README_ZH-CN.md ] && echo 'Yes' || echo 'No')"
        echo "=== Recent commits ==="
        git log --oneline -5
        echo "=== README.md content preview ==="
        head -5 README.md
    
    - name: Run Chinese translation script
      if: steps.check-readme.outputs.readme_changed == 'true'
      run: |
        python scripts/translate_to_chinese.py
     
    - name: Check for changes
      if: steps.check-readme.outputs.readme_changed == 'true'
      id: check-changes
      run: |
        # Check if README_ZH-CN.md exists and has content
        if [ -f README_ZH-CN.md ] && [ -s README_ZH-CN.md ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md exists and has content"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "README_ZH-CN.md does not exist or is empty"
        fi
    
    - name: Submit Chinese version
      if: steps.check-readme.outputs.readme_changed == 'true' && steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Starting git operations..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "Adding README_ZH-CN.md to git..."
        git add README_ZH-CN.md
        
        echo "Committing changes..."
        git commit -m "🤖 Manual update Chinese version README_ZH-CN.md
        
        Generated by GitHub Actions
        Source file: README.md
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        
        echo "Pushing to repository..."
        git push origin HEAD:${{ github.ref }}
        echo "Successfully pushed changes!" 