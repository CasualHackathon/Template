name: Update Hackathon Information & Sync README

on:
  push:
    branches:
      - main
    paths:
      - 'participants/*/README.md'
      - 'participants/*/project/**'
      - 'materials/NFT/**'
      - 'README.md'
  pull_request:
    branches:
      - main
    paths:
      - 'participants/*/README.md'
      - 'participants/*/project/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-and-sync:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update hackathon information
        run: |
          echo "🚀 Updating hackathon participant information..."
          python3 scripts/update_hackathon.py
          
      - name: Translate to Chinese (if script exists)
        run: |
          if [ -f "scripts/translate_to_chinese.py" ]; then
            echo "🌐 Translation script found, running translation..."
            python3 scripts/translate_to_chinese.py
          else
            echo "ℹ️ Translation script not found, skipping translation"
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changed files
          git add README.md
          if [ -f README_ZH-CN.md ]; then
            git add README_ZH-CN.md
          fi
          
          # Generate commit message
          commit_msg="🤖 Auto-update: Update participant information"
          if [ -f README_ZH-CN.md ]; then
            commit_msg+=" and Chinese translation"
          fi
          
          git commit -m "$commit_msg"
          git pull --rebase origin main
          git push
          
          echo "✅ Changes committed and pushed successfully!"
